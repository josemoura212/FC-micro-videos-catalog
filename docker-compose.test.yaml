services:

  app:
    build:
      dockerfile: Dockerfile.dev
    command: ./.docker/start.dev.sh
    volumes:
      - .:/home/rustdev/app
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ~/.docker/config.json:/home/rustdev/.docker/config.json:ro
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    labels:
      filebeat_collector: true
    stop_signal: SIGKILL
    stdin_open: true
    tty: true
    privileged: true
